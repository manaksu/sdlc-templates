name: AI SDLC (parallel)

# Parallel-sandbox evolution of ai-sdlc.yml. See SANDBOX-ORCHESTRATOR.md.
#
# Active flow (safe by default):
#   1. triage : reuse scripts/triage.py — analyze the requirement, post analysis, decide if a
#               human is needed (proceed=true|false).  [same gate as the base pipeline]
#   2. plan   : scripts/plan.py — decompose into independent, file-fenced slices, write the
#               ownership map (.wave/ownership.json), post the plan, and STOP for human review.
#
# The autonomous fan-out (build matrix → integrate → consolidate) is intentionally NOT wired up
# yet — it is scaffolded as commented YAML at the bottom of this file. Enable it deliberately,
# per repo, only after the plan output has proven sound on real requirements (PLAYBOOK §8).
#
# PREREQUISITES on the caller repo (same as ai-sdlc.yml):
#   • secret ANTHROPIC_API_KEY (via `secrets: inherit`)
#   • default workflow token = "Read and write"
#   • the caller repo must carry docs/learning-log/ (the plan reads its INDEX for grounding)

on:
  workflow_call:
    inputs:
      model:
        type: string
        default: "claude-opus-4-8"
      max_sandboxes:
        description: "Cap on parallel slices the planner may propose"
        type: number
        default: 4
      templates_ref:
        description: "Ref of sdlc-templates to load triage.py / plan.py from"
        type: string
        default: "v1"

# No top-level permissions block — relies on the caller's default token (must be read/write).
# Declaring permissions here would be validated at startup and fail read-only repos.

jobs:
  # ───────────── 1. ANALYZE + human gate (reused) ─────────────
  triage:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.analyze.outputs.proceed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: ManaksAI/sdlc-templates
          ref: ${{ inputs.templates_ref }}
          path: .sdlc
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q anthropic
      - id: analyze
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          MODEL: ${{ inputs.model }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ toJson(github.event.issue.labels.*.name) }}
          # Parallel flow uses its own labels so it never collides with the
          # single-agent ai-sdlc.yml (which owns `requirement` / `approved`).
          APPROVE_LABEL: approved-parallel
          REQUIREMENT_LABEL: requirement-parallel
        run: python .sdlc/scripts/triage.py

  # ───────────── 2. PLAN: decompose + ownership map (then STOP for review) ─────────────
  plan:
    needs: triage
    if: ${{ needs.triage.outputs.proceed == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      parallelizable: ${{ steps.plan.outputs.parallelizable }}
      count: ${{ steps.plan.outputs.count }}
      slices: ${{ steps.plan.outputs.slices }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: ManaksAI/sdlc-templates
          ref: ${{ inputs.templates_ref }}
          path: .sdlc
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q anthropic
      - id: plan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          MODEL: ${{ inputs.model }}
          MAX_SANDBOXES: ${{ inputs.max_sandboxes }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python .sdlc/scripts/plan.py
      - uses: actions/upload-artifact@v4
        with:
          name: ownership-map
          path: .wave/ownership.json
          if-no-files-found: ignore

