name: Standard SDLC

# Reusable pipeline. Other repos call it with:
#
#   jobs:
#     sdlc:
#       uses: ManaksAI/sdlc-templates/.github/workflows/standard-sdlc.yml@v1
#
# Every job below runs in PARALLEL except where `needs:` declares a dependency.
# All real work is delegated to `make <target>` so the SAME commands run
# locally and in CI. Each project's Makefile decides what each verb means.

on:
  workflow_call:
    inputs:
      enable_codeql:
        description: "Run GitHub CodeQL SAST (only for CodeQL-supported languages)"
        type: boolean
        default: false
      codeql_languages:
        description: "Comma list for CodeQL, e.g. 'python,javascript'"
        type: string
        default: "python"

# No top-level permissions: the default pipeline runs on a read-only token so it
# works on any repo with zero settings changes. Only the optional CodeQL job
# requests elevated permissions (see the `sast` job).

jobs:
  # ───────────── PARALLEL GROUP 1: static quality ─────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make lint

  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make format-check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make typecheck

  # ───────────── PARALLEL GROUP 2: tests ─────────────
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make test-unit

  integration-tests:
    needs: [unit-tests]                # gated: only after unit tests pass
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make test-integration

  # ───────────── PARALLEL GROUP 3: security ─────────────
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Run the gitleaks CLI directly instead of the action's PR mode: it scans
      # git history locally with NO GitHub API calls, so it works identically on
      # push and pull_request events and never needs elevated token permissions.
      # Auto-loads .gitleaks.toml from the repo root if present, else default rules.
      - name: Secret scan (gitleaks)
        run: |
          VER=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --source . --redact -v --exit-code 1

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  # NOTE: CodeQL needs a read/write token to upload results. We do NOT declare
  # `permissions:` here, because requesting more than the repo's default token is
  # validated at workflow STARTUP (before `if:`) and would fail every run on a
  # read-only repo. To use CodeQL: set the repo's default workflow permissions to
  # "Read and write" (Settings → Actions → General), then set enable_codeql: true.
  sast:
    if: ${{ inputs.enable_codeql }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ inputs.codeql_languages }}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  # ───────────── GATED: build (after static quality) ─────────────
  build:
    needs: [lint, typecheck, format-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make build
